<!DOCTYPE html>
<html>

<head>

    <title>Cloud Data Redundancy Removal System</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background-color: darkblue;
        }

        table{
            margin-top: 20px;
            border-collapse: collapse;
        }

        th{
            background-color: #ddd;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Cloud Data Redundancy Removal System</h2>

        {% if message %}
            <p style="color: {{ color }};">
                {{ message }}
            </p>
        {% endif %}

        <h3>Stored Users</h3>

        <table border="1" width="100%" cellpadding="10">

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>

            {% for user in users %}

            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>

                <td>
                    <a href="/delete/{{ user.email }}">
                        <button type="button">Delete</button>
                    </a>
                </td>
            </tr>

            {% endfor %}

        </table>

        <br><br>

        <form method="POST" action="/add">

            <input type="text"
                   name="name"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <button type="submit">Submit</button>

        </form>

    </div>

</body>

</html>
